<h2>Resumo</h2>

<p>
Misa Amane é uma personagem do anime Death Note. Ela é uma modelo famosa
e admiradora de Kira. Após receber um Death Note, passa a ajudar Light
Yagami em seus planos. Sua personalidade é alegre, determinada e muito
leal às pessoas que ama.
