<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro - Misa Amane</title>

<style>

body{
    background-color: rgb(148, 13, 33);
    margin: 0;
    font-family: Arial, sans-serif;
}

.menu{
    background-color: rgb(104, 12, 24);
    height: 60px;
}

.menu h3{
    color: white;
    margin-left: 20px;
    padding-top: 15px;
}

h1{
    color: white;
    text-align: center;
    font-size: 70px;
    font-family: cursive;
}

.cadastro{
    background-color: white;
    width: 700px;
    height: 550px;
    margin: auto;
    border-radius: 20px;
    padding: 30px;
}


label{
    font-size: 20px;
    color: rgb(92, 13, 23);
}

.caixa{
    width: 680px;
    height: 55px;
    background-color: rgb(92, 13, 23);
    border-radius: 10px;
    margin-top: 10px;
    margin-bottom: 20px;
}

button{
    width: 150px;
    height: 50px;
    background-color: rgb(104, 12, 24);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 20px;
    margin: 15px;
}

.botoes{
    text-align: center;
}

footer{
    background-color: rgb(92, 13, 23);
    height: 50px;
    margin-top: 50px;
}

</style>
</head>

<body>

<div class="menu">
    <h3>home</h3>
</div>

<h1>Faça Seu Cadastro</h1>

<div class="cadastro">

    <label>login</label>
    <div class="caixa"></div>

    <label>senha</label>
    <div class="caixa"></div>




<label>nome</label>
    <div class="caixa"></div>

    <label>email</label>
    <div class="caixa"></div>

    <div class="botoes">
        <button>cadastro</button>
        <button>logar</button>
    </div>

</div>

<footer></footer>

</body>
</html>
