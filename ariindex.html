<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Misa Amane</title>

<style>

body{
    background-color: rgb(148, 13, 33);
    margin: 0;
    font-family: Arial, sans-serif;
}

.menu{
    background-color: rgb(92, 13, 23);
    height: 60px;
}

.menu h3{
    color: white;
    margin-left: 20px;
    padding-top: 15px;
}


h1{
    color: white;
    text-align: center;
    font-size: 70px;
    font-family: cursive;
}

.login{
    background-color: white;
    width: 500px;
    height: 450px;
    margin: auto;
    border-radius: 20px;
    padding: 30px;
}

label{
    font-size: 30px;
    color: rgb(92, 13, 23);
}




.caixa{
    width: 500px;
    height: 50px;
    background-color: rgb(92, 13, 23);
    border-radius: 10px;
    margin-top: 10px;
    margin-bottom: 30px;
}

button{
    width: 170px;
    height: 60px;
    background-color: rgb(92, 13, 23);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 25px;
    margin: 20px;
}

.botoes{
    text-align: center;
}





footer{
    background-color: rgb(92, 13, 23);
    height: 50px;
    margin-top: 50px;
}

</style>
</head>

<body>

<div class="menu">
    <h3>Home</h3>
</div>

<h1>Faça Seu Login</h1>

<div class="login">

    <label>Login</label>
    <div class="caixa"></div>

    <label>Senha</label>
    <div class="caixa"></div>

    <div class="botoes">
        <button>Cadastro</button>
        <button>Logar</button>
    </div>

</div>

<footer></footer>





</body>
</html>
